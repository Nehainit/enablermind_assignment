services:
  - type: web
    name: enablemind-research
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install --no-deps crewai openai duckduckgo-search requests beautifulsoup4 lxml markdown weasyprint python-dotenv pydantic pydantic-settings structlog pytest pytest-mock && pip install -r requirements-web.txt
    startCommand: uvicorn web.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false  # User must set this in Render dashboard (PRIMARY - REQUIRED)
      - key: GEMINI_API_KEY
        sync: false  # Optional: Add Gemini as backup for rate limit fallback
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant  # FASTEST model, 3x faster than 70b
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_RESEARCH_ITERATIONS
        value: "1"
    healthCheckPath: /health
