services:
  - type: web
    name: enablemind-research
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && pip install -r requirements-web.txt
    startCommand: uvicorn web.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false  # User must set this in Render dashboard
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_RESEARCH_ITERATIONS
        value: "3"
    healthCheckPath: /health
