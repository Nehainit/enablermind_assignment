<!-- Feedback Modal Component -->
<div id="feedback-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
        <!-- Modal Header -->
        <div class="border-b border-gray-200 px-6 py-4 flex items-center justify-between">
            <h3 class="text-xl font-semibold text-gray-900">Provide Feedback</h3>
            <button onclick="closeFeedbackModal()" class="text-gray-400 hover:text-gray-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Modal Body -->
        <form id="feedback-form" class="p-6 space-y-4">
            <input type="hidden" id="feedback-job-id" name="job_id" value="{{ job.job_id }}">

            <!-- Feedback Type -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    What would you like to improve?
                </label>
                <div class="space-y-2">
                    <label class="flex items-center">
                        <input type="checkbox" name="feedback_type" value="more_depth" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                        <span class="ml-2 text-sm text-gray-700">Need more depth/detail</span>
                    </label>
                    <label class="flex items-center">
                        <input type="checkbox" name="feedback_type" value="more_sources" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                        <span class="ml-2 text-sm text-gray-700">Need more sources/citations</span>
                    </label>
                    <label class="flex items-center">
                        <input type="checkbox" name="feedback_type" value="different_focus" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                        <span class="ml-2 text-sm text-gray-700">Different focus/angle needed</span>
                    </label>
                    <label class="flex items-center">
                        <input type="checkbox" name="feedback_type" value="missing_topics" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                        <span class="ml-2 text-sm text-gray-700">Missing important topics</span>
                    </label>
                </div>
            </div>

            <!-- Detailed Feedback -->
            <div>
                <label for="feedback_text" class="block text-sm font-medium text-gray-700 mb-2">
                    Specific Feedback <span class="text-red-500">*</span>
                </label>
                <textarea
                    id="feedback_text"
                    name="feedback_text"
                    rows="6"
                    required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"
                    placeholder="What specific improvements would you like? What's missing? What needs more detail?"
                ></textarea>
                <p class="mt-1 text-xs text-gray-500">
                    Be specific! The AI will use this feedback to generate an improved report.
                </p>
            </div>

            <!-- Additional Instructions -->
            <div>
                <label for="additional_instructions" class="block text-sm font-medium text-gray-700 mb-2">
                    Additional Instructions (Optional)
                </label>
                <textarea
                    id="additional_instructions"
                    name="additional_instructions"
                    rows="3"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"
                    placeholder="Any other requirements? Target audience? Specific format?"
                ></textarea>
            </div>

            <!-- Buttons -->
            <div class="flex justify-end space-x-3 pt-4">
                <button
                    type="button"
                    onclick="closeFeedbackModal()"
                    class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition"
                >
                    Cancel
                </button>
                <button
                    type="submit"
                    class="px-6 py-2 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition"
                >
                    Generate Improved Report
                </button>
            </div>
        </form>
    </div>
</div>

<script>
function openFeedbackModal(jobId) {
    document.getElementById('feedback-job-id').value = jobId;
    document.getElementById('feedback-modal').classList.remove('hidden');
    document.getElementById('feedback-modal').classList.add('flex');
}

function closeFeedbackModal() {
    document.getElementById('feedback-modal').classList.add('hidden');
    document.getElementById('feedback-modal').classList.remove('flex');
    document.getElementById('feedback-form').reset();
}

document.getElementById('feedback-form').addEventListener('submit', async function(e) {
    e.preventDefault();

    const formData = new FormData(e.target);
    const data = {
        job_id: formData.get('job_id'),
        feedback_types: formData.getAll('feedback_type'),
        feedback_text: formData.get('feedback_text'),
        additional_instructions: formData.get('additional_instructions')
    };

    // Show loading state
    const submitBtn = e.target.querySelector('button[type="submit"]');
    const originalText = submitBtn.innerHTML;
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<svg class="animate-spin h-5 w-5 inline mr-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Generating...';

    try {
        const response = await fetch('/api/feedback/regenerate', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok) {
            // Redirect to new job
            window.location.href = '/job/' + result.new_job_id;
        } else {
            alert('Error: ' + result.detail);
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalText;
        }
    } catch (error) {
        alert('Failed to submit feedback. Please try again.');
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalText;
    }
});

// Close modal on escape key
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        closeFeedbackModal();
    }
});
</script>
