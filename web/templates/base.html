<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EnableMind Research System{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Google Fonts - Playfair Display -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/custom.css">

    <!-- Custom JS -->
    <script src="/static/js/app.js" defer></script>

    <style>
        .font-playfair {
            font-family: 'Playfair Display', serif;
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body class="bg-white min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-6xl mx-auto px-6 sm:px-8 lg:px-12">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="/" class="flex items-center group">
                        <span class="text-2xl font-playfair font-bold text-gray-900">EnableMind</span>
                    </a>
                </div>
                <div class="flex items-center space-x-4 text-sm text-gray-600">
                    <span class="hidden sm:inline">3 AI Agents</span>
                    <span class="hidden sm:inline">·</span>
                    <span class="hidden sm:inline">CrewAI</span>
                    <span class="hidden sm:inline">·</span>
                    <span class="hidden sm:inline">Groq</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Flash Messages Container -->
    <div id="flash-messages" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-4">
        {% block flash_messages %}{% endblock %}
    </div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-24">
        <div class="max-w-6xl mx-auto px-6 sm:px-8 lg:px-12 py-12">
            <div class="text-center">
                <p class="text-sm text-gray-500">EnableMind Research System · v0.1.0</p>
                <p class="text-xs text-gray-400 mt-2">Powered by CrewAI and Groq</p>
            </div>
        </div>
    </footer>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
