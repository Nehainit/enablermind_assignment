<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EnableMind Research System{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/custom.css">

    <!-- Custom JS -->
    <script src="/static/js/app.js" defer></script>

    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gradient-to-br from-gray-50 via-blue-50 to-purple-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-gradient-to-r from-slate-900 via-slate-800 to-slate-900 shadow-xl border-b border-slate-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20">
                <div class="flex items-center">
                    <a href="/" class="flex items-center group">
                        <div class="bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl p-2 group-hover:scale-110 transition-transform">
                            <svg class="h-7 w-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                            </svg>
                        </div>
                        <div class="ml-4">
                            <span class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400">EnableMind</span>
                            <span class="block text-xs text-gray-400 font-medium">Multi-Agent Research Platform</span>
                        </div>
                    </a>
                </div>
                <div class="flex items-center space-x-6">
                    <div class="hidden md:flex items-center space-x-2 text-sm">
                        <span class="px-3 py-1 bg-slate-700 text-blue-300 rounded-lg font-medium border border-slate-600">
                            3 AI Agents
                        </span>
                        <span class="text-gray-400">×</span>
                        <span class="px-3 py-1 bg-slate-700 text-purple-300 rounded-lg font-medium border border-slate-600">
                            CrewAI
                        </span>
                        <span class="text-gray-400">×</span>
                        <span class="px-3 py-1 bg-slate-700 text-pink-300 rounded-lg font-medium border border-slate-600">
                            Groq
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Flash Messages Container -->
    <div id="flash-messages" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-4">
        {% block flash_messages %}{% endblock %}
    </div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="text-center text-sm text-gray-600">
                <p>EnableMind Research System v0.1.0</p>
                <p class="mt-1">Powered by CrewAI and Groq</p>
            </div>
        </div>
    </footer>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
